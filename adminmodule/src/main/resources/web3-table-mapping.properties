# WEB3 migration changes - Table mapping configuration
# 
# Behavior:
# - Web2 mode: Uses original table names (e.g., admin_countries)
# - Web3 mode: Automatically appends _web3 suffix to ALL tables (e.g., admin_countries_web3)
#
# Custom Mappings (optional):
# If you need a different table name than the auto-generated one, add a mapping here.
# Format: web2_table_name=custom_web3_table_name
# Custom mappings take precedence over the auto _web3 suffix.
#
# Example custom mapping (if you need a different name):
# admin_countries=admin_countries_custom_web3
#
# Note: Most tables don't need custom mappings - they will automatically get _web3 suffix in Web3 mode.

