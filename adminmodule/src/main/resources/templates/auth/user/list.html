<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="base/list_header :: head"></head>
<div id="wrapper">
    <div th:replace="base/top_header" :: div></div>
    <div th:replace="base/left_menu" :: div></div>

    <div class="content-page">
        <div class="content">

            <!-- Start Content-->
            <div class="container-fluid">

                <!-- start page title -->
                <div class="row">
                    <div class="col-12">
                        <div class="page-title-box">
                            <div class="page-title-right">
                                <ol class="breadcrumb m-0">
                                    <li class="breadcrumb-item"><a href="javascript: void(0);">Admin user Management</a></li>
                                    <li class="breadcrumb-item active">Admin User View</li>
                                </ol>
                            </div>
                            <h4 class="page-title">View User</h4>
                        </div>
                    </div>
                </div>
                <!-- end title -->
                <div class="row">
                    <div class="col-12">
                        <div class="card-box">
                            <div class="row">
                                <div class="col-lg-8"> <h4 class="header-title mb-4">Manage Admin Users</h4> </div>
                                <div class="col-lg-4 text-right" th:if="${#authorization.expression('hasAnyRole(''USER_CREATE'',''SUPERADMIN'')')}"><a href="/user" class="btn btn-primary waves-effect waves-light mb-4"><i class="mdi mdi-plus mr-1"></i> Add User</a></div>
                            </div>
                            <input type="hidden" name="current_record" id="current_record" value="" />

                            <table class="table table-hover table-striped m-0 table-centered nowrap w-100 viewtable" id="scroll-horizontal-datatable">
                                <thead>
                                <tr>
                                    <th>User Id</th>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th>Username</th>
                                    <th>Mobile Access</th>
                                    <th>Status</th>
                                    <th style="width: 82px;" th:if="${#authorization.expression('hasAnyRole(''USER_EDIT'',''SUPERADMIN'',''USER_DELETE'')')}">Action</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="user : ${users}">
                                    <td th:text="${user.id}"></td>
                                    <td th:text="${user.firstName}"></td>
                                    <td th:text="${user.lastName}"></td>
                                    <td th:text="${user.email}"></td>
                                    <td th:if="${user.isMobileAccess}"><span class="badge badge-soft-success">Yes</span></td>
                                    <td th:unless="${user.isMobileAccess}"><span class="badge badge-soft-danger">No</span></td>
                                    <td th:if="${user.publish}"><span class="badge badge-soft-success">Active</span></td>
                                    <td th:unless="${user.publish}"><span class="badge badge-soft-danger">In Active</span></td>
                                    <td th:if="${#authorization.expression('hasAnyRole(''SUPERADMIN'',''USER_DELETE'',''USER_EDIT'')')}">
                                        <a th:href="@{/user/edit/{id}(id=${user.id})}" class="action-icon">
                                            <i class="mdi mdi-square-edit-outline" th:if="${#authorization.expression('hasAnyRole(''SUPERADMIN'',''USER_EDIT'')')}"></i>
                                        </a>
                                        <!--<a href="javascript:void(0);" class="action-icon" th:id="${user.id}" onclick="setCurrentValue(this.id)">
                                            <i class="mdi mdi-delete dellist"></i>
                                        </a>-->
                                        <a class="action-icon" th:if="${#authorization.expression('hasAnyRole(''SUPERADMIN'',''USER_DELETE'')')}">
                                            <i th:id="${user.id}" class="mdi mdi-delete dellist"></i>
                                        </a>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div><!-- end col -->
                </div>
                <!-- end row -->
            </div> <!-- container -->

        </div> <!-- content -->

        <footer th:replace="base/footer :: footer"></footer>

        <div id="confirm-delete" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog modal-sm">
                <div class="modal-content">
                    <div class="modal-body p-4">
                        <div class="text-center">
                            <i class="dripicons-information h1 text-warning"></i>
                            <h4 class="mt-2">Heads up!</h4>
                            <p class="mt-3">Are you sure you want to delete?</p>
                            <button type="button" class="btn btn-primary my-2 confirm-deletemap" data-dismiss="modal" onclick="deleteConfirm(this.id)" id="confirmDeleteAction" cid="">
                                Yes
                            </button>
                            <button type="button" class="btn btn-outline-primary my-2" data-dismiss="modal">No</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="success-alert-modal" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog modal-sm">
                <div class="modal-content">
                    <div class="modal-body p-4">
                        <div class="text-center">
                            <i class="dripicons-checkmark h1 text-secondarycolor"></i>
                            <h4 id="modalMsg" class="mt-2 text-secondarycolor">Well Done!</h4>
                            <p id="modalMsg2" class="mt-3 text-secondarycolor">Deleted</p>
                            <button type="button" class="btn btn-outline-primary my-2" data-dismiss="modal" onclick="closeDeletePopup()">Continue</button>
                        </div>
                    </div>
                </div>
            </div><!-- /.modal-dialog -->
        </div><!-- /.modal -->
    </div>

</div>
</body>
<script th:src="@{/js/vendor.min.js}"></script>
<script th:src="@{/libs/datatables.net/js/jquery.dataTables.min.js}"></script>
<script th:src="@{/libs/datatables.net-bs4/js/dataTables.bootstrap4.min.js}"></script>
<script th:src="@{/libs/datatables.net-responsive/js/dataTables.responsive.min.js}"></script>
<script th:src="@{/libs/datatables.net-responsive-bs4/js/responsive.bootstrap4.min.js}"></script>
<script th:src="@{/libs/datatables.net-buttons/js/dataTables.buttons.min.js}"></script>
<script th:src="@{/libs/datatables.net-buttons/js/buttons.html5.min.js}"></script>
<script th:src="@{/libs/datatables.net-select/js/dataTables.select.min.js}"></script>
<script th:src="@{/js/deleteUserAjax.js}"></script>
<script>

                function setCurrentValue(value) {
                    $("#current_record").val(value);
                }
                function deleteConfirm() {
                    var cid=$("#confirmDeleteAction").attr("cid");
                    deleteUserAjaxRequest(cid)
                    //window.location.href="/user/delete/"+id;
                }
            $(document).ready(function () {
                $(".dellist").click(function(){

                    //alert(this.id)
                    del_id=this.id
                    $('#confirm-delete').modal('show')
                    $("#confirmDeleteAction").attr("cid",this.id)
                })
                var del_id=0
                $("#scroll-horizontal-datatable").DataTable({
                scrollX: !0,
                language: {
                    paginate: {
                    previous: "<i class='mdi mdi-chevron-left'>",
                    next: "<i class='mdi mdi-chevron-right'>",
                    },
                },
                drawCallback: function () {
                    $(".dataTables_paginate > .pagination").addClass("pagination-rounded");
                },
                }),
                $("#state-saving-datatable").DataTable({
                stateSave: !0,
                language: {
                    paginate: {
                    previous: "<i class='mdi mdi-chevron-left'>",
                    next: "<i class='mdi mdi-chevron-right'>",
                    },
                },
                drawCallback: function () {
                    $(".dataTables_paginate > .pagination").addClass("pagination-rounded");
                },
                });
                });

</script>
<script th:src="@{/js/app.min.js}"></script>
<script th:src="@{/js/custom.js}"></script>
</html>
