<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/img/xdc-primary-icon.png}">
    <link rel="icon" type="image/png" sizes="16x16" media="(prefers-color-scheme: dark)" th:href="@{/img/xdc-inverted-primary-icon.png}">
    <link rel="shortcut icon" th:href="@{/img/xdc-primary-icon.png}">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet" type="text/css" id="bs-default-stylesheet" />
    <link th:href="@{/css/app.min.css}" rel="stylesheet" type="text/css" id="app-default-stylesheet" />
    <link rel="stylesheet" th:href="@{/css/override.css}">

</head>

<body class="loading authentication-bg authentication-bg-pattern">
<div class="account-pages mt-5 mb-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 col-xl-5">
                <div class="card bg-pattern">

                    <div class="card-body p-4">
                        <div class="text-center w-75 m-auto">
                            <div class="auth-logo text-center">
                                <img th:src="@{/img/xdc-payments-logo.png}" alt="XDC Payments" class="img-fluid">
                            </div>
                        </div>
                        <p class="text-muted mb-4 mt-3 text-center">Enter your email address and we'll send you an email with instructions to reset your password.</p>
                        <form th:action="@{/password}" class="needs-validation" th:object="${passwordDTO}" method="post" autocomplete="off">
                            <div th:if="${confirmationMessage}" class="alert alert-success" role="alert" th:text=${confirmationMessage}></div>
                            <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>
                            <div class="form-group mb-3">
                                <label for="email">Email address</label>
                                <input class="form-control" type="email" th:field="*{email}" id="email" name="*email" required placeholder="Enter your email">
                                <div class="invalid-feedback">
                                    Please provide a valid Email.
                                </div>
                            </div>
                            <div class="form-group mb-3">
                                <label for="phoneNumber">Mobile Number</label>
                                <input class="form-control" type="tel" th:field="*{phoneNumber}" id="phoneNumber" name="*phoneNumber" required placeholder="Mobile number" maxlength="10">
                                <div class="invalid-feedback">
                                    Please provide a valid value.
                                </div>
                            </div>
                            <div class="form-group mb-0 text-center">
                                <button class="btn btn-primary btn-block" type="submit"> Reset Password </button>
                            </div>
                        </form>

                    </div> <!-- end card-body -->
                </div>
                <!-- end card -->

                <div class="row mt-3">
                    <div class="col-12 text-center">
                        <p class="text-white-50">Back to <a th:href="@{/login}" class="text-white ml-1"><b>Log in</b></a></p>
                    </div> <!-- end col -->
                </div>
                <!-- end row -->

            </div> <!-- end col -->
        </div>
        <!-- end row -->
    </div>
    <!-- end container -->
</div>
<script th:src="@{/js/vendor.min.js}"></script>
<script th:src="@{/js/app.min.js}"></script>
<script th:src="@{/js/custom.js}"></script>

</body>
</html>
