<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="base/header :: head"></head>
<div id="wrapper">
    <div th:replace="base/top_header" :: div></div>
    <div th:replace="base/left_menu" :: div></div>

    <div class="content-page">
        <div class="content">

            <!-- Start Content-->
            <div class="container-fluid">

                <!-- start page title -->
                <div class="row">
                    <div class="col-12">
                        <div class="page-title-box">
                            <div class="page-title-right">
                                <ol class="breadcrumb m-0">
                                    <li class="breadcrumb-item"><a href="javascript: void(0);">Admin user Management</a>
                                    </li>
                                    <li th:if="${user.id == null}" class="breadcrumb-item active">Add User</li>
                                    <li th:if="${user.id != null}" class="breadcrumb-item active">Edit User</li>
                                </ol>
                            </div>
                            <h4 class="page-title" th:if="${user.id == null}">Add User</h4>
                            <h4 class="page-title" th:if="${user.id != null}">Edit User</h4>
                        </div>
                    </div>
                </div>
                <!-- end page title -->
                <form action="#" th:action="@{/user/create}" th:object="${user}" method="post">
                    <div th:if="${confirmationMessage}" class="alert alert-success" role="alert"
                         th:text=${confirmationMessage}></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" role="alert"
                         th:text="${errorMessage}"></div>
                    <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"
                         class="validation-message alert alert-danger" role="alert"></div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="card-box">
                                <h5 class="text-uppercase mt-0 mb-3 bg-light p-2">Personal Details</h5>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="firstname">First Name</label>
                                            <input class="form-control onlychar" type="text" id="firstName"
                                                   th:field="*{firstName}" minlength="2"  maxlength="50" required>
                                            <div class="invalid-feedback">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="lastname">Last Name</label>
                                            <input class="form-control onlychar" type="text" id="lastName"
                                                   th:field="*{lastName}" minlength="2"  maxlength="50" required>
                                            <div class="invalid-feedback"></div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="dob">Date of Birth</label>
                                            <input class="form-control" type="date"id="dob" th:field="*{dob}" th:value="${#calendars.format(dob,'yyyy-MM-dd')}" required>
                                            <div class="invalid-feedback"></div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="mob_num">Mobile Number</label>
                                            <div class="input-group">
                                                <div class="input-group-prepend">
                                                    <select class="selectpicker show-tick border border-right-0"
                                                            required title="code" data-style="btn"
                                                            data-dropup-auto="false" th:field="*{dialingCode}"
                                                            id="dialingCode"
                                                            name="*dialingCode">
                                                        <option th:each="country : ${countries}"
                                                                th:value="${country.dialingCode}"
                                                                th:text="${country.dialingCode}"
                                                                selected="${user.dialingCode == country.dialingCode}"></option>
                                                    </select>
                                                </div>
                                                <input class="form-control" type="tel" id="mob_num"
                                                       th:field="*{phoneNumber}" maxlength="10" minlength="10" pattern="[1-9]{1}[0-9]{5}[0-9]{4}" required>
                                            </div>
                                            <div class="invalid-feedback">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="locationMaster">Location</label>
                                            <select class="selectpicker show-tick border" th:field="*{locationMaster}"
                                                    id="locationMaster"
                                                    name="*locationMaster" required title="Select Location"
                                                    data-style="btn" data-dropup-auto="false">
                                                <option th:each="location : ${locationMasters}"
                                                        th:value="${location.id}"
                                                        th:text="${location.locationName}"
                                                        selected="${location.id == locationMaster}"></option>
                                            </select>
                                            <div class="invalid-feedback">

                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="email">Email</label>
                                            <input class="form-control" type="email" id="email"
                                                   th:field="*{email}" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$">
                                            <div class="invalid-feedback">

                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group mt-3">
                                            <label for="isMobileAccess" class="mr-2">Mobile Access</label>
                                            <label for="isMobileAccess" class="checkboxtoggle pt-2">
                                                <input type="checkbox" id="isMobileAccess" class="checkbox_input"
                                                       th:field="*{isMobileAccess}">
                                                <div class="checkboxtoggle_fill"></div>
                                            </label>
                                            <div class="invalid-feedback">

                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6" th:if="${id != null}">
                                        <div class="form-group mt-3">
                                            <label class="mr-2">Status</label>
                                            <label for="publish" class="checkboxtoggle pt-2">
                                                <input type="checkbox" id="publish" th:field="*{publish}" class="checkbox_input" checked>
                                                <div class="checkboxtoggle_fill"></div>
                                            </label>
                                            <div class="invalid-feedback">

                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card-box">
                                <h5 class="text-uppercase mt-0 mb-3 bg-light p-2">Partner Details</h5>
                                <div class="form-group mb-3">
                                    <label for="partner">Partner Id</label>
                                    <select class="selectpicker show-tick border"
                                            title="Select Partner Id" data-style="btn" data-dropup-auto="false"
                                            th:field="*{partner}" id="partner"
                                            name="*partner" required>
                                        <option th:each="partner : ${partners}" th:value="${partner.id}"
                                                th:text="${partner.partnerName}"
                                                selected="${partner.id == partner}"></option>
                                    </select>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="card-box ">
                                <h5 class="text-uppercase mt-0 mb-3 bg-light p-2">Group Role Mapping</h5>
                                <div id="role_content">
                                    <div class="mapparent" id="group_role_1" th:each="a, stat : ${groupRolesDTOS}">
                                        <div class="row align-items-center mapping">
                                            <div class="col-md-6">
                                                <div class="form-group mb-3">
                                                    <label for="group">Group</label>
                                                    <select class="selectpicker show-tick border" required
                                                            title="Select Group" data-style="btn"
                                                            data-dropup-auto="false"
                                                            th:field="*{groupRolesDTOS[__${stat.index}__].groupMaster}"
                                                            id="1"
                                                            onchange="getRolesList(this.value,this.id)" onload="getRolesList(this.value,this.id)">
                                                        <option value="0">Select Group</option>
                                                        <option th:each="group : ${groups}"
                                                                th:value="${group.id}"
                                                                th:text="${group.groupName}"/>
                                                    </select>
                                                    <div class="invalid-feedback">
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <div class="form-group mb-3">
                                                    <label for="role">Role</label>
                                                    <div class="d-flex">
                                                        <select class="selectpicker show-tick border"  multiple data-live-search="true" required  title="Select Role" data-style="btn" data-dropup-auto="false"
                                                                th:field="*{groupRolesDTOS[__${stat.index}__].roleMaster}"
                                                                id="roleMaster_1">
                                                            <!--<option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.roleName}" />-->
                                                        </select>
                                                        <!--<a href="javascript:void(0);" class="action-icon ml-2 deletemap"
                                                           onclick="deleteRoleGroup('1')"><i class="mdi mdi-delete"></i></a>-->
                                                    </div>
                                                    <div class="invalid-feedback">

                                                    </div>
                                                </div>
                                            </div>

                                        </div>
                                        <div class="mapchild"></div>
                                    </div>
                                </div>
                                <div class="text-center">
                                    <button class="btn btn-primary w-sm waves-effect waves-light" type="button" onclick="addMoreRoles()"> Add
                                        More
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="text-center" th:if="${id == null}">
                        <button class="btn btn-primary w-sm waves-effect waves-light" type="submit"> Add User</button>
                    </div>
                    <div class="text-center" th:if="${id != null}">
                        <button class="btn btn-primary w-sm waves-effect waves-light" type="submit"> Update User</button>
                    </div>
                    <input type="hidden" id="id" th:field="*{id}">
                    <input type="hidden" id="count" name="count" value="1">
                </form>

                <!-- end row -->

            </div> <!-- container -->
            <footer th:replace="base/footer :: footer"></footer>
            <!-- Modal -->
            <div id="confirm-delete" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
                <div class="modal-dialog modal-sm">
                    <div class="modal-content">
                        <div class="modal-body p-4">
                            <div class="text-center">
                                <i class="dripicons-information h1 text-info"></i>
                                <h4 class="mt-2">Heads up!</h4>
                                <p class="mt-3">Are you sure you want to delete?</p>
                                <button type="button" class="btn btn-primary my-2 confirm-deletemap"
                                        data-dismiss="modal">Yes
                                </button>
                                <button type="button" class="btn btn-outline-primary my-2" data-dismiss="modal">No
                                </button>
                            </div>
                        </div>
                    </div><!-- /.modal-content -->
                </div><!-- /.modal-dialog -->
            </div><!-- /.modal -->
            <!-- Success Alert Modal -->
            <div id="success-alert-modal" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
                <div class="modal-dialog modal-sm">
                    <div class="modal-content">
                        <div class="modal-body p-4">
                            <div class="text-center">
                                <i class="dripicons-checkmark h1 text-secondarycolor"></i>
                                <h4 class="mt-2 text-secondarycolor">Well Done!</h4>
                                <p class="mt-3 text-secondarycolor">Mapping Deleted</p>
                                <button type="button" class="btn btn-outline-primary my-2" data-dismiss="modal">
                                    Continue
                                </button>
                            </div>
                        </div>
                    </div>
                </div><!-- /.modal-dialog -->
            </div><!-- /.modal -->
        </div> <!-- content -->
    </div>
</div>
<script th:src="@{/js/vendor.min.js}"></script>
<script th:src="@{/libs/bootstrap-datepicker/js/bootstrap-datepicker.min.js}"></script>
<script th:src="@{/libs/bootstrap-select/js/bootstrap-select.min.js}"></script>
<!-- App js -->
<script th:src="@{/js/app.min.js}"></script>
<script th:src="@{/js/custom.js}"></script>
<script type="text/javascript">
	function getRolesList(groupId,bindId) {
		$.ajax({
			type: 'GET',
			url: '/load/roles/' + groupId,
			success: function(result) {
				var result = JSON.parse(result);
				var s = '';
				for(var i = 0; i < result.length; i++) {
					s += '<option value="' + result[i].id + '">' + result[i].roleName + '</option>';
				}
				$('#roleMaster_'+bindId).html(s);
				$('.selectpicker').selectpicker('refresh');
			}
		});
	}
		function deleteRoleGroup(removeId) {
	    $("#group_role_"+removeId).remove();
	}

</script>
<script th:inline="javascript">
function addMoreRoles() {
    var message = [[${groups}]];
    console.log(message);
    var countVal = $("#count").val();
    var idVal = parseInt(countVal)+parseInt(1);
    $("#count").val(parseInt(countVal)+parseInt(1));
     var featureData = '<div class="mapparent" id="group_role_'+idVal+'">';
         featureData += '<div class="row align-items-center mapping">';
         featureData += '<div class="col-md-6">';
         featureData += '<div class="form-group mb-3">';
         featureData += '<label >Group</label>';
         featureData += '<select class="form-control" required title="Select Group" name="groupRolesDTOS['+countVal+'].groupMaster" id="'+idVal+'" onchange="getRolesList(this.value,this.id)">';
         featureData += '<option value="0">Select Group</option>';
         for(var i = 0; i < message.length; i++) {
            featureData += '<option value="' + message[i].id + '">' + message[i].groupName + '</option>';
         }
         featureData += '</select>';
         featureData += '<div class="invalid-feedback">';
         featureData += '</div>';
         featureData += '</div>';
         featureData += '</div>';
         featureData += '<div class="col-md-6">';
         featureData += '<div class="form-group mb-3">';
         featureData += '<label>Role</label>';
         featureData += '<div class="d-flex">';
         featureData += '<select class="selectpicker show-tick border"  multiple data-live-search="true" required  title="Select Role" data-style="btn" data-dropup-auto="false"  id="roleMaster_'+idVal+'" name="groupRolesDTOS['+countVal+'].roleMaster">';
         //featureData += '<option value="0">Select Role</option>';
         featureData += '</select>';
         featureData += '<a href="javascript:void(0);" class="action-icon ml-2 deletemap" onclick="deleteRoleGroup('+idVal+')"><i class="mdi mdi-delete"></i></a>';
         featureData += '</div>';
         featureData += '<div class="invalid-feedback">';
         featureData += '</div>';
         featureData += '</div>';
         featureData += '</div>';
         featureData += '</div>';
         featureData += '<div class="mapchild"></div>';
         featureData += '</div>';
         $("#role_content").append(featureData);
         $('.selectpicker').selectpicker('refresh');
}

</script>
</body>
</html>
