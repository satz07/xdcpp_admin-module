<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="base/list_header :: head"></head>
<div id="wrapper">
    <div th:replace="base/top_header" :: div></div>
    <div th:replace="base/left_menu" :: div></div>
    <div class="content-page">
        <div class="content">
            <div class="container-fluid">
                <!-- start page title -->
                <div class="row">
                    <div class="col-12">
                        <div class="page-title-box">
                            <div class="page-title-right">
                                <ol class="breadcrumb m-0">
                                    <li class="breadcrumb-item"><a href="javascript: void(0);">Masters</a></li>
                                    <li class="breadcrumb-item"><a href="/location">Location</a></li>
                                    <li class="breadcrumb-item active">Location List</li>
                                </ol>
                            </div>
                            <h4 class="page-title">Location List</h4>
                        </div>
                    </div>
                </div>
                <!-- end page title -->
                <div class="row">
                    <div class="col-12">
                        <div class="card-box">
                            <div th:switch="${locations}" class="">
                                <div class="row">
                                    <div class="col-lg-8"> <h4 class="header-title mb-4">Manage Location</h4> </div>
                                    <div class="col-lg-4 text-right" th:if="${#authorization.expression('hasRole(''SUPERADMIN'')')}"><a href="/location" class="btn btn-primary waves-effect waves-light mb-4"><i class="mdi mdi-plus mr-1"></i> Add Location</a></div>
                                </div>
                                <div class="row">
                                    <div class="col-md-12">
                                        <h2 th:case="null">No record found !!</h2>
                                        <div th:case="*" class="table-responsive">
                                            <div th:if="${confirmationMessage}" class="alert alert-success" id="alert-success"
                                                 role="alert" th:text=${confirmationMessage}></div>

                                            <div th:if="${errorMessage}"
                                                 class="alert alert-danger" role="alert" id="alert-danger"
                                                 th:text="${errorMessage}"></div>
                                            <table class="table table-hover table-striped m-0 table-centered nowrap w-100 viewtable" id="scroll-horizontal-datatable">
                                                <thead>
                                                <tr>
                                                    <th>Location</th>
                                                    <th>Status</th>
                                                    <th th:if="${#authorization.expression('hasAnyRole(''SUPERADMIN'')')}">Action</th>
                                                </tr>
                                                </thead>
                                                <tbody>
                                                <tr th:each="location : ${locations}">
                                                    <td th:text="${location.locationName}"></td>
                                                    <td th:if="${location.publish}"><span class="badge badge-soft-success">Active</span></td>
                                                    <td th:unless="${location.publish}"><span class="badge badge-soft-danger">In Active</span></td>
                                                    <td th:if="${#authorization.expression('hasAnyRole(''SUPERADMIN'')')}">
                                                        <a th:href="@{/location/edit/{id}(id=${location.id})}" class="action-icon"> <i class="mdi mdi-square-edit-outline"></i>
                                                        </a>
                                                        <a  class="action-icon" th:if="${#authorization.expression('hasAnyRole(''SUPERADMIN'')')}">
                                                            <i th:id="${location.id}" class="mdi mdi-delete dellist"></i>
                                                        </a>
                                                        <!--<a href="javascript:void(0);" class="action-icon">
                                                            <i class="mdi mdi-delete dellist"></i>
                                                        </a>
                                                        <div id="confirm-delete" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
                                                            <div class="modal-dialog modal-sm">
                                                                <div class="modal-content">
                                                                    <div class="modal-body p-4">
                                                                        <div class="text-center">
                                                                            <i class="dripicons-information h1 text-warning"></i>
                                                                            <h4 class="mt-2">Heads up!</h4>
                                                                            <p class="mt-3">Are you sure you want to delete?</p>
                                                                            <button type="button" class="btn btn-primary my-2 confirm-deletemap" data-dismiss="modal" th:id="${location.id}" onclick="deleteConfirm(this.id)">
                                                                                Yes
                                                                            </button>
                                                                            <button type="button" class="btn btn-outline-primary my-2" data-dismiss="modal">No</button>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>-->
                                                    </td>
                                                </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
       </div> <!-- content -->
        <footer th:replace="base/footer :: footer"></footer>

        <div id="confirm-delete" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog modal-sm">
                <div class="modal-content">
                    <div class="modal-body p-4">
                        <div class="text-center">
                            <i class="dripicons-information h1 text-warning"></i>
                            <h4 class="mt-2">Heads up!</h4>
                            <p class="mt-3">Are you sure you want to delete?</p>
                            <button type="button" class="btn btn-primary my-2 confirm-deletemap" data-dismiss="modal" onclick="deleteConfirm(this.id)"  id="confirmDeleteAction" cid="">
                                Yes
                            </button>
                            <button type="button" class="btn btn-outline-primary my-2" data-dismiss="modal">No</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="success-alert-modal" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog modal-sm">
                <div class="modal-content">
                    <div class="modal-body p-4">
                        <div class="text-center">
                            <i class="dripicons-checkmark h1 text-secondarycolor"></i>
                            <h4 class="mt-2 text-secondarycolor">Well Done!</h4>
                            <p class="mt-3 text-secondarycolor">Deleted</p>
                            <button type="button" class="btn btn-outline-primary my-2" data-dismiss="modal">Continue</button>
                        </div>
                    </div>
                </div>
            </div><!-- /.modal-dialog -->
        </div><!-- /.modal -->
    </div>
</div>

    <script th:src="@{/js/vendor.min.js}"></script>
    <!-- third party js -->
    <script th:src="@{/libs/datatables.net/js/jquery.dataTables.min.js}"></script>
    <script th:src="@{/libs/datatables.net-bs4/js/dataTables.bootstrap4.min.js}"></script>
    <script th:src="@{/libs/datatables.net-responsive/js/dataTables.responsive.min.js}"></script>
    <script th:src="@{/libs/datatables.net-responsive-bs4/js/responsive.bootstrap4.min.js}"></script>
    <script th:src="@{/libs/datatables.net-buttons/js/dataTables.buttons.min.js}"></script>
    <script th:src="@{/libs/datatables.net-buttons/js/buttons.html5.min.js}"></script>
    <script th:src="@{/js/deleteLocationAjax.js}"></script>
    <!-- Tickets js -->
    <script>
     setTimeout(function () {
                $("#alert-danger").fadeTo(2000, 500).slideUp(500, function () {
                    $("#alert-danger").remove();
                });
              }, 3000);
   setTimeout(function () {
                $("#alert-success").fadeTo(2000, 500).slideUp(500, function () {
                    $("#alert-success").remove();
                });
              }, 3000);
             function deleteConfirm() {
  
            
             
	
	var cid=$("#confirmDeleteAction").attr("cid")
	deletecountrysAjaxRequest(cid)
                  //  window.location.href="/country/delete/"+id;
                    //window.location.reload();
                    
        }
            $(document).ready(function () {
	$(".dellist").click(function(){
		
		
		del_id=this.id	
		 $('#confirm-delete').modal('show')
		 $("#confirmDeleteAction").attr("cid",this.id)
	})
               var del_id=0
            $("#scroll-horizontal-datatable").DataTable({
            scrollX: !0,
            language: {
                paginate: {
                previous: "<i class='mdi mdi-chevron-left'>",
                next: "<i class='mdi mdi-chevron-right'>",
                },
            },
            drawCallback: function () {
                $(".dataTables_paginate > .pagination").addClass("pagination-rounded");
            },
            }),
            $("#state-saving-datatable").DataTable({
            stateSave: !0,
            language: {
                paginate: {
                previous: "<i class='mdi mdi-chevron-left'>",
                next: "<i class='mdi mdi-chevron-right'>",
                },
            },
            drawCallback: function () {
                $(".dataTables_paginate > .pagination").addClass("pagination-rounded");
            },
            });
            });
    </script>
    <!-- App js -->
    <script  th:src="@{/js/app.min.js}"></script>
    <script  th:src="@{/js/custom.js}"></script>
</body>
</html>
