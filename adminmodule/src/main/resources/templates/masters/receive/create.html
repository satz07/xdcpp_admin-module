<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="base/header :: head"></head>
<div id="wrapper">
    <div th:replace="base/top_header" :: div></div>
    <div th:replace="base/left_menu" :: div></div>

    <div class="content-page">
        <div class="content">

            <!-- Start Content-->
            <div class="container-fluid">

                <!-- start page title -->
                <div class="row">
                    <div class="col-12">
                        <div class="page-title-box">
                            <div class="page-title-right">
                                <ol class="breadcrumb m-0">
                                    <li class="breadcrumb-item"><a href="javascript: void(0);">Masters</a></li>
                                    <li class="breadcrumb-item"><a href="javascript: void(0);">Receivemode</a></li>
                                    <li th:if="${receive.id == null}" class="breadcrumb-item active"><a href="/receive/list">Add Receivemode</a></li>
                                    <li th:if="${receive.id != null}" class="breadcrumb-item active">Edit Receivemode</li>
                                </ol>
                            </div>

                            <h4 class="page-title" th:if="${receive.id == null}">Add Receivemode</h4>
                            <h4 class="page-title" th:if="${receive.id != null}">Edit Receivemode</h4>
                        </div>
                    </div>
                </div>

                <form action="#" th:action="@{/receive/create}"
                      th:object="${receive}" method="post" class="needs-validation" novalidate autocomplete="off" role="form" data-toggle="validator">
                    <div th:if="${confirmationMessage}" class="alert alert-success"
                         role="alert" th:text=${confirmationMessage}></div>

                    <div th:if="${errorMessage}"
                         class="alert alert-danger" role="alert"
                         th:text="${errorMessage}"></div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="card-box">
                                <h5 class="text-uppercase mt-0 mb-3 bg-light p-2">User Details</h5>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label>User Type</label>
                                            <div class="radio radio-primary mb-2">
                                                <input type="radio" id="business" name="userType" th:value="BUSINESS" th:field="*{userType}" required>
                                                <label for="business" class="mr-3">
                                                    Business
                                                </label>
                                                <input type="radio" id="personal" name="userType" th:value="PERSONAL" th:field="*{userType}" required>
                                                <label for="personal">
                                                    Personal
                                                </label>
                                                <div class="invalid-feedback">
                                                    Invalid User Type
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="userCategory">User Category</label>
                                            <select class="selectpicker border rounded show-tick" data-style="btn" data-dropup-auto="false" th:field="*{userCategory}" id="userCategory" name="*userCategory" title="Select User Category" required>
                                                <option th:each="category : ${categories}" th:value="${category}" th:text="${category}"></option>
                                            </select>
                                            <div class="invalid-feedback">

                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card-box">
                                <h5 class="text-uppercase mt-0 mb-3 bg-light p-2">Country Details</h5>
                                <div class="form-group mb-3">
                                    <label for="countries">Receive Country Code</label>
                                    <select class="selectpicker border rounded show-tick" data-style="btn" data-dropup-auto="false"
                                            th:field="*{countries}" id="countries" name="*countries" title="Select Country Code" required>
                                        <option th:each="country : ${countries}" th:value="${country.id}" >[[${country.countryCode}]] - [[${country.countryName}]]</option>
                                    </select>
                                    <div class="invalid-feedback">
                                        Invlaid Country code
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card-box">
                                <h5 class="text-uppercase mt-0 mb-3 bg-light p-2">Currency Details</h5>
                                <div class="form-group mb-3">
                                    <label for="currencies">Currency Code</label>
                                    <select class="selectpicker border rounded show-tick" data-style="btn" data-dropup-auto="false"
                                            th:field="*{currencies}" id="currencies" name="*currencies" title="Select Currency Code" required>
                                       
                                    </select>
                                    <div class="invalid-feedback">
                                        Invlaid Country code
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card-box">
                                <h5 class="text-uppercase mt-0 mb-3 bg-light p-2">Receivemode Details</h5>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="paymentCodeMaster">Receivemode Code</label>
                                            <select class="selectpicker border rounded show-tick" data-style="btn" data-dropup-auto="false"
                                                    th:field="*{paymentCodeMaster}" id="paymentCodeMaster" name="*paymentCodeMaster" title="Select Receivemode Code" required>

                                                <option th:each="payment : ${paymentCode}" th:value="${payment.id}" th:text="${payment.paymentCode}"></option>
                                            </select>
                                            <div class="invalid-feedback">
                                                Invlaid Receivemode code
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="description">Receivemode Description</label>
                                            <input class="form-control" type="text" th:field="*{description}" id="description"  required placeholder="Enter Receivemode Description">
                                            <div class="invalid-feedback">
                                                Invlaid Description
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="comments">Comments</label>
                                            <textarea class="form-control" type="text" th:field="*{comments}" id="comments" cols="30" rows="5" placeholder="Add comments"></textarea>
                                        </div>
                                    </div>
                                    <div class="col-md-6" th:if="${id != null}">
                                        <div class="form-group mt-3">
                                            <label class="mr-2">Status</label>
                                            <label for="publish" class="checkboxtoggle pt-2">
                                                <input type="checkbox" id="publish" th:field="*{publish}" class="checkbox_input" checked>
                                                <div class="checkboxtoggle_fill"></div>
                                            </label>
                                            <div class="invalid-feedback">

                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" id="id" th:field="*{id}">
                    <input type="hidden" id="paymentModeType" th:field="*{paymentModeType}" th:value="${paymentModeType}">
                    <div class="text-center" th:if="${id == null}">
                        <button class="btn btn-primary w-sm waves-effect waves-light" type="submit"> Add Receivemode</button>
                    </div>
                    <div class="text-center" th:if="${id != null}">
                        <button class="btn btn-primary w-sm waves-effect waves-light" type="submit"> Update Receivemode</button>
                    </div>
                </form>
            </div> <!-- container -->

        </div> <!-- content -->
        <!-- Footer Start -->
        <footer th:replace="base/footer :: footer"></footer>
        <!-- end Footer -->
        <div id="notification-modal" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog modal-sm">
                <div class="modal-content">
                    <div class="modal-body p-4">
                        <div class="text-center">
                            <h4 class="mt-2">Authorize</h4>
                            <p class="mt-3">Fee</p>
                            <button type="button" class="btn btn-primary my-2" data-dismiss="modal">Yes</button>
                            <button type="button" class="btn btn-outline-primary my-2" data-dismiss="modal">No</button>
                        </div>
                    </div>
                </div><!-- /.modal-content -->
            </div><!-- /.modal-dialog -->
        </div>
    </div>

</div>
</body>
<script th:src="@{/js/vendor.min.js}"></script>
<script  th:src="@{/libs/bootstrap-datepicker/js/bootstrap-datepicker.min.js}"></script>
<script  th:src="@{/libs/bootstrap-select/js/bootstrap-select.min.js}"></script>

<!-- App js -->
<script  th:src="@{/js/app.min.js}"></script>
<script  th:src="@{/js/custom.js}"></script>
<script  th:src="@{/js/customPaymentAjax.js}"></script>
</html>
