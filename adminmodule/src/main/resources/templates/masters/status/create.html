<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="base/header :: head"></head>
<div id="wrapper">
    <div th:replace="base/top_header" :: div></div>
    <div th:replace="base/left_menu" :: div></div>

    <div class="content-page">
        <div class="content">

            <!-- Start Content-->
            <div class="container-fluid">

                <!-- start page title -->
                <div class="row">
                    <div class="col-12">
                        <div class="page-title-box">
                            <div class="page-title-right">
                                <ol class="breadcrumb m-0">
                                    <li class="breadcrumb-item"><a href="javascript: void(0);">Masters</a></li>
                                    <li class="breadcrumb-item"><a href="javascript: void(0);">Status</a></li>
                                    <li th:if="${statusMaster.id == null}" class="breadcrumb-item active"><a href="/status/list">Add Status</a></li>
                                    <li th:if="${statusMaster.id != null}" class="breadcrumb-item active">Edit Status</li>
                                </ol>
                            </div>
                            <h4 class="page-title" th:if="${statusMaster.id == null}">Add Status</h4>
                            <h4 class="page-title" th:if="${statusMaster.id != null}">Edit Status</h4>
                        </div>
                    </div>
                </div>
                <!-- end page title -->
                <form th:action="@{/status/create}" th:object="${statusMaster}" method="post" class="needs-validation" novalidate autocomplete="off">
                    <div th:if="${confirmationMessage}" class="alert alert-success" role="alert" th:text=${confirmationMessage}></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>
                    <div class="row">
                        <div class="col-md-12">
                            <div class="card-box">
                                <h5 class="text-uppercase mt-0 mb-3 bg-light p-2">General Details</h5>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="statusCode">Status Code</label>
                                            <input class="form-control" type="tel" id="statusCode" th:field="*{statusCode}" required maxlength="6" minlength="3" placeholder="Enter Status Code">
                                            <div class="invalid-feedback">
                                                Invalid Status Code
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="statusDescription">Status Description</label>
                                            <input class="form-control" type="text" id="statusDescription" th:field="*{statusDescription}" required placeholder="Enter Status Description">
                                            <div class="invalid-feedback">
                                                Invalid Status Description
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="customerStatusDesc">Status Description for Customer</label>
                                            <textarea class="form-control" type="text" id="customerStatusDesc" th:field="*{customerStatusDesc}" cols="30" rows="5"></textarea>
                                        </div>
                                    </div>
                                    <div class="col-md-6" th:if="${id != null}">
                                        <div class="form-group mt-3">
                                            <label class="mr-2">Status</label>
                                            <label for="publish" class="checkboxtoggle pt-2">
                                                <input type="checkbox" id="publish" th:field="*{publish}" class="checkbox_input" checked>
                                                <div class="checkboxtoggle_fill"></div>
                                            </label>
                                            <div class="invalid-feedback">

                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="text-center">
                        <input type="hidden" id="id" th:field="*{id}">
                        <div class="text-center" th:if="${id == null}">
                            <button class="btn btn-primary w-sm waves-effect waves-light" type="submit"> Add Status</button>
                        </div>
                        <div class="text-center" th:if="${id != null}">
                            <button class="btn btn-primary w-sm waves-effect waves-light" type="submit"> Update Status</button>
                        </div>
                    </div>
                </form>
            </div> <!-- container -->

        </div> <!-- content -->
        <footer th:replace="base/footer :: footer"></footer>
        <!-- end Footer -->
        <div id="notification-modal" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog modal-sm">
                <div class="modal-content">
                    <div class="modal-body p-4">
                        <div class="text-center">
                            <h4 class="mt-2">Authorize</h4>
                            <p class="mt-3">Fee</p>
                            <button type="button" class="btn btn-primary my-2" data-dismiss="modal">Yes</button>
                            <button type="button" class="btn btn-outline-primary my-2" data-dismiss="modal">No</button>
                        </div>
                    </div>
                </div><!-- /.modal-content -->
            </div><!-- /.modal-dialog -->
        </div>
    </div>

</div>
<script th:src="@{/js/vendor.min.js}"></script>
<script  th:src="@{/libs/bootstrap-select/js/bootstrap-select.min.js}"></script>
<!-- App js -->
<script  th:src="@{/js/app.min.js}"></script>
<script  th:src="@{/js/custom.js}"></script>
</body>
</html>
