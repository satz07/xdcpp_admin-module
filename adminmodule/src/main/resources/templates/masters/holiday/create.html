<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="base/header :: head"></head>
<div id="wrapper">
    <div th:replace="base/top_header" :: div></div>
    <div th:replace="base/left_menu" :: div></div>

    <div class="content-page">
        <div class="content">
            <!-- Start Content-->
            <div class="container-fluid">
                <!-- start page title -->
                <div class="row">
                    <div class="col-12">
                        <div class="page-title-box">
                            <div class="page-title-right">
                                <ol class="breadcrumb m-0">
                                    <li class="breadcrumb-item"><a href="javascript: void(0);">Masters</a></li>
                                    <li class="breadcrumb-item"><a href="javascript: void(0);">Holiday Calendar</a></li>
                                    <li th:if="${holiday.id == null}" class="breadcrumb-item active"><a href="/holiday/list">Holiday Calendar</a></li>
                                    <li th:if="${holiday.id != null}" class="breadcrumb-item active">Edit Holiday Calendar</li>
                                </ol>
                            </div>
                            <h4 class="page-title" th:if="${holiday.id == null}">Add Holiday Calendar</h4>
                            <h4 class="page-title" th:if="${holiday.id != null}">Edit Holiday Calendar</h4>
                        </div>
                    </div>
                </div>
                <!-- end page title -->
                <div class="row">
                    <div class="col-lg-12 text-right"><a href="holiday/uploadfile"
                                                         class="btn btn-primary waves-effect waves-light mb-4"><i
                            class="mdi mdi-plus mr-1"></i>Import/Export Holidays</a></div>
                </div>
                <form th:action="@{/holiday/create}" th:object="${holiday}" method="post" class="needs-validation" novalidate autocomplete="off">
                    <div th:if="${confirmationMessage}" class="alert alert-success" role="alert" th:text=${confirmationMessage}></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>
                    <div class="row">
                        <div class="col-md-12">
                            <div class="card-box">
                                <h5 class="text-uppercase mt-0 mb-3 bg-light p-2">General Details</h5>
                                <div class="row">
                                    <div class="col-md-4">
                                        <div class="form-group mb-3">
                                            <label for="country">Select Country</label>
                                            <select class="selectpicker border rounded show-tick" data-style="btn"
                                                    data-dropup-auto="false"
                                                    th:field="*{country}" id="country" name="*country"
                                                    title="Select Country" required>
                                                <option th:each="country : ${countries}" th:value="${country.id}">
                                                    [[${country.countryName}]]
                                                </option>
                                            </select>
                                            <div class="invalid-feedback">
                                                Invlaid Country code
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="form-group mb-3">
                                            <label for="type">Type</label>
                                            <select class="selectpicker border rounded show-tick" data-style="btn"
                                                    data-dropup-auto="false"
                                                    th:field="*{type}" id="type" name="*type" title="Select Type"
                                                    required>
                                                <option th:each="type : ${types}" th:value="${type}"
                                                        th:text="${type}"></option>
                                            </select>
                                            <div class="invalid-feedback">
                                                Invalid Holiday Type
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="form-group mb-3">
                                            <label for="date">Date</label>
                                            <input name="*date" class="form-control" type="date"
                                                   th:field="*{date}" id="date"
                                                   placeholder="yyyy-MM-dd">
                                            <div class="invalid-feedback">
                                                Invlaid Date
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-4">
                                        <div class="form-group mb-3">
                                            <label for="day">Day</label>
                                            <select class="selectpicker border rounded show-tick" data-style="btn"
                                                    data-dropup-auto="false"
                                                    th:field="*{day}" id="day" name="*day" title="Select Day">
                                                <option th:each="day : ${days}" th:value="${day}"
                                                        th:text="${day}"></option>
                                            </select>
                                            <div class="invalid-feedback">
                                                Invalid Calendar Day
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="form-group mb-3">
                                            <label for="description">Holiday</label>
                                            <input class="form-control" type="text"
                                                   th:field="*{description}" id="description"
                                                   placeholder="Holiday Description">
                                            <div class="invalid-feedback">
                                                Invlaid Description
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" id="id" th:field="*{id}">
                    <div class="text-center" th:if="${holiday.id == null}">
                        <button class="btn btn-primary w-sm waves-effect waves-light" type="submit"> Add Holiday Calendar</button>
                    </div>
                    <div class="text-center" th:if="${holiday.id != null}">
                        <button class="btn btn-primary w-sm waves-effect waves-light" type="submit"> Update Holiday Calendar</button>
                    </div>
                </form>
            </div> <!-- container -->
        </div>
        <footer th:replace="base/footer :: footer"></footer>
        <div id="notification-modal" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog modal-sm">
                <div class="modal-content">
                    <div class="modal-body p-4">
                        <div class="text-center">
                            <h4 class="mt-2">Authorize</h4>
                            <p class="mt-3">Holiday Calendar</p>
                            <button type="button" class="btn btn-primary my-2" data-dismiss="modal">Yes</button>
                            <button type="button" class="btn btn-outline-primary my-2" data-dismiss="modal">No</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/vendor.min.js}"></script>
<script th:src="@{/libs/bootstrap-select/js/bootstrap-select.min.js}"></script>
<!-- App js -->
<script th:src="@{/libs/jquery-mask-plugin/jquery.mask.min.js}"></script>
<script th:src="@{/js/app.min.js}"></script>
<script th:src="@{/js/custom.js}"></script>
</body>
</html>
