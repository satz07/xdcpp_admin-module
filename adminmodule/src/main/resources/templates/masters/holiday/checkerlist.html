<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="base/list_header :: head"></head>
<div id="wrapper">
    <div th:replace="base/top_header" :: div></div>
    <div th:replace="base/left_menu" :: div></div>

    <div class="content-page">
        <div class="content">

            <!-- Start Content-->
            <div class="container-fluid">

                <!-- start page title -->
                <div class="row">
                    <div class="col-12">
                        <div class="page-title-box">
                            <div class="page-title-right">
                                <ol class="breadcrumb m-0">
                                    <li class="breadcrumb-item"><a href="javascript: void(0);">Masters</a></li>
                                    <li class="breadcrumb-item"><a href="/holiday">Holiday Calendar</a></li>
                                    <li class="breadcrumb-item active">Holidays</li>
                                </ol>
                            </div>
                            <h4 class="page-title">Holiday Calendar</h4>
                        </div>
                    </div>
                </div>
                <!-- end page title -->
                <div class="row">
                    <div class="col-12">
                        <div class="card-box">
                            <div class="row">
                                <div class="col-lg-8"><h4 class="header-title mb-4">Holiday Calendar List</h4></div>
                                <div class="col-lg-4 text-right" th:if="${#authorization.expression('hasAnyRole(''SUPERADMIN'',''HOLIDAY_CREATE'')')}"><a href="/holiday" class="btn btn-primary waves-effect waves-light mb-4"><i
                                        class="mdi mdi-plus mr-1"></i> Add Holiday</a>
                                </div>
                                <div th:if="${confirmationMessage}" class="alert alert-success" id="alert-success"
                                     role="alert" th:text=${confirmationMessage}></div>

                                <div th:if="${errorMessage}"
                                     class="alert alert-danger" role="alert" id="alert-danger"
                                     th:text="${errorMessage}"></div>

                            </div>
                            <table class="table table-hover table-striped m-0 table-centered nowrap w-100 viewtable" id="scroll-horizontal-datatable">
                                <thead>
                                <tr>
                                    <th>Country</th>
                                    <th>Type</th>
                                    <th>Date</th>
                                    <th>Day</th>
                                    <th>Description</th>
                                    <th>Status</th>
                                    <th  th:if="${#authorization.expression('hasAnyRole(''SUPERADMIN'',''HOLIDAY_APPROVE'')')}">Action</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="holiday : ${holiday}">
                                    <td th:text="${holiday.countryName}"></td>
                                    <td th:text="${holiday.type}"></td>
                                    <td th:text="${holiday.date}"></td>
                                    <td th:text="${holiday.day}"></td>
                                    <td th:text="${holiday.description}"></td>

                                    <td th:if="${holiday.publish}"><span class="badge badge-soft-success">Approved</span></td>
                                    <td th:unless="${holiday.publish}"><span class="badge badge-soft-danger">Pending Approval</span></td>
                                    <td  th:if="${#authorization.expression('hasAnyRole(''SUPERADMIN'',''HOLIDAY_APPROVE'')')}">
                                        <a th:href="@{/holiday/{id}/approve(id=${holiday.id})}" class="action-icon">
                                            <i class="fa fa-check-circle" style="font-size:24px;color:green"></i>
                                        </a>
                                        <!--<a href="javascript:void(0);" class="action-icon">
                                            <i class="mdi mdi-delete dellist"></i>
                                        </a>-->
                                        <a th:href="@{/holiday/reject/{id}(id=${holiday.id})}" class="action-icon" th:if="${#authorization.expression('hasAnyRole(''SUPERADMIN'')')}">
                                            <i class='fas fa-ban' style='font-size:24px;color:red'></i>
                                        </a>

                                    </td>
                                </tr>
                                </tbody>
                            </table>
                            </div>
                    </div><!-- end col -->
                </div>
            </div> <!-- container -->

        </div> <!-- content -->

        <footer th:replace="base/footer :: footer"></footer>

        <!-- end Footer -->
        <div id="confirm-delete" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog modal-sm">
                <div class="modal-content">
                    <div class="modal-body p-4">
                        <div class="text-center">
                            <i class="dripicons-information h1 text-warning"></i>
                            <h4 class="mt-2">Heads up!</h4>
                            <p class="mt-3">Are you sure you want to delete?</p>
                            <button type="button" class="btn btn-primary my-2 confirm-deletemap" data-dismiss="modal" onclick="deleteConfirm(this.id)">
                                Yes
                            </button>
                            <button type="button" class="btn btn-outline-primary my-2" data-dismiss="modal">No</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="success-alert-modal" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog modal-sm">
                <div class="modal-content">
                    <div class="modal-body p-4">
                        <div class="text-center">
                            <i class="dripicons-checkmark h1 text-secondarycolor"></i>
                            <h4 class="mt-2 text-secondarycolor">Well Done!</h4>
                            <p class="mt-3 text-secondarycolor">Deleted</p>
                            <button type="button" class="btn btn-outline-primary my-2" data-dismiss="modal">Continue</button>
                        </div>
                    </div>
                </div>
            </div><!-- /.modal-dialog -->
        </div><!-- /.modal -->
    </div>


</div>
<script th:src="@{/js/vendor.min.js}"></script>
<!-- third party js -->
<script th:src="@{/libs/datatables.net/js/jquery.dataTables.min.js}"></script>
<script th:src="@{/libs/datatables.net-bs4/js/dataTables.bootstrap4.min.js}"></script>
<script th:src="@{/libs/datatables.net-responsive/js/dataTables.responsive.min.js}"></script>
<script th:src="@{/libs/datatables.net-responsive-bs4/js/responsive.bootstrap4.min.js}"></script>
<script th:src="@{/libs/datatables.net-buttons/js/dataTables.buttons.min.js}"></script>
<script th:src="@{/libs/datatables.net-buttons/js/buttons.html5.min.js}"></script>
<script th:src="@{/libs/datatables.net-select/js/dataTables.select.min.js}"></script>
<script th:src="@{/libs/bootstrap-select/js/bootstrap-select.min.js}"></script>
<script>
    function deleteConfirm(id) {
        window.location.href="/holiday/delete/"+id;
    }
    $(document).ready(function () {
       table = $("#scroll-horizontal-datatable").DataTable({
        scrollX: !0,
        language: {
            paginate: {
            previous: "<i class='mdi mdi-chevron-left'>",
            next: "<i class='mdi mdi-chevron-right'>",
            },
        },
        drawCallback: function () {
            $(".dataTables_paginate > .pagination").addClass("pagination-rounded");
        },
        }),
        $("#state-saving-datatable").DataTable({
        stateSave: !0,
        language: {
            paginate: {
            previous: "<i class='mdi mdi-chevron-left'>",
            next: "<i class='mdi mdi-chevron-right'>",
            },
        },
        drawCallback: function () {
            $(".dataTables_paginate > .pagination").addClass("pagination-rounded");
        },
        });

        $('#userType, #sendCurrencyCode, #receiveCurrencyCode, #status').change( function() {

            var utypeVal = $("#userType").val();
            var selVal = $("#sendCurrencyCode").val();
            var receiveVal = $("#receiveCurrencyCode").val();
            var statusVal = $("#status").val();

            if ((table.column(0).search() != utypeVal) || (table.column(3).search() != selVal) || (table.column(5).search() != receiveVal) || (table.column(15).search() != statusVal)) {
                table.column(0).search(utypeVal).column(3).search(selVal).column(5).search(receiveVal).column(15).search(statusVal).draw();
            }
            if ((selVal == "" && receiveVal == "" && statusVal == "") && utypeVal != "") {
                table.column(0).search(utypeVal).draw();
            }
            if ((utypeVal == "" && receiveVal == "" && statusVal == "") && selVal != "") {
                table.column(3).search(selVal).draw();
            }
            if ((utypeVal == "" && selVal == "" && statusVal == "") && receiveVal != "") {
                table.column(5).search(receiveVal).draw();
            }
            if ((utypeVal == "" && selVal == "" && receiveVal == "") && statusVal != "") {
                table.column(15).search(statusVal).draw();
            }

            if(utypeVal == "" && receiveVal == "" && selVal == "" && statusVal == "") {
                table.search('').columns().search('').draw();
            }
        });
    });
</script>
<!-- App js -->
<script th:src="@{/js/app.min.js}"></script>
<script th:src="@{/js/custom.js}"></script>
</body>
</html>
