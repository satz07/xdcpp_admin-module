<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title th:text="${brand.name} + ' - Log In'">Log In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet" type="text/css" id="bs-default-stylesheet" />
    <link th:href="@{/css/app.min.css}" rel="stylesheet" type="text/css" id="app-default-stylesheet" />
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{${brand.favicon}}">
    <link rel="icon" type="image/png" sizes="16x16" media="(prefers-color-scheme: dark)" th:href="@{${brand.darkFavicon}}">
    <link rel="shortcut icon" th:href="@{${brand.favicon}}">
    <link th:href="@{/css/icons.min.css}" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" th:href="@{/css/override.css}">
    <link th:href="@{/css/icons.min.css}" rel="stylesheet" type="text/css" />

</head>

<body class="loading authentication-bg authentication-bg-pattern">

<div class="account-pages mt-5 mb-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 col-xl-5">
                <div class="card bg-pattern">
                    <div class="card-body p-4">
                        <div class="text-center w-75 m-auto">
                            <div class="auth-logo text-center">
                                <img th:src="@{${brand.loginImage}}" th:alt="${brand.name}" class="img-fluid">
                            </div>
                            <div th:if="${param.error != null}" style="color: red;">Wrong credentials!!</div>
                            <p class="text-muted mb-4 mt-3 text-center">Enter your email address and password to access admin panel.</p>
                        </div>
                        <form th:action="@{/login}" method="post" class="needs-validation" novalidate autocomplete="off">
                            <div class="form-group mb-3">
                                <label for="username">Email address</label>
                                <input class="form-control" type="text" id="username" name="username"  required="" placeholder="Enter your email">
                                <div class="invalid-feedback">
                                    Please provide a valid Email.
                                </div>
                            </div>
                            <div class="form-group mb-3">
                                <label for="password">Password</label>
                                <div class="input-group input-group-merge">
                                    <input type="password" id="password" name="password"  class="form-control" placeholder="Enter your password" required>
                                    <div class="input-group-append" data-password="false">
                                        <div class="input-group-text">
                                            <span class="password-eye"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group mb-3">
                                <div class="custom-control custom-checkbox">
                                    <input type="checkbox" class="custom-control-input" id="remember" name="remember">
                                    <label class="custom-control-label" for="remember">Remember me</label>
                                </div>
                            </div>
                            <div class="form-group mb-0 text-center">
                                <button class="btn btn-primary btn-block" type="submit"> Log In </button>
                            </div>
                        </form>
                    </div> <!-- end card-body -->
                </div>
                <!-- end card -->
                <div class="row mt-3">
                    <div class="col-12 text-center">
                        <p> <a href="/forgetpassword" class="text-white-50 ml-1">Forgot your password?</a></p>
                    </div> <!-- end col -->
                </div>
                <!-- end row -->

            </div> <!-- end col -->
        </div>
        <!-- end row -->
    </div>
    <!-- end container -->
</div>
<!-- end page -->

<script th:src="@{/js/vendor.min.js}"></script>
<script th:src="@{/js/app.min.js}"></script>
<script th:src="@{/js/custom.js}"></script>
</body>
</html>
