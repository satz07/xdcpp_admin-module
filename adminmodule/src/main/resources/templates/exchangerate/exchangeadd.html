<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="base/header :: head"></head>
<div id="wrapper">
    <div th:replace="base/top_header" :: div></div>
    <div th:replace="base/left_menu" :: div></div>

    <div class="content-page">
        <div class="content">
            <!-- Start Content-->
            <div class="container-fluid">
                <!-- start page title -->
                <div class="row">
                    <div class="col-12">
                        <div class="page-title-box">
                            <div class="page-title-right">
                                <ol class="breadcrumb m-0">
                                    <li class="breadcrumb-item"><a href="javascript: void(0);">Exchange Rate</a></li>
                                    <li class="breadcrumb-item active">Add</li>
                                </ol>
                            </div>
                            <h4 class="page-title">Add Exchange Rate</h4>
                        </div>
                    </div>
                </div>
                <form th:action="@{/exchangerate}"  class="needs-validation" novalidate autocomplete="off">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="card-box">
                                <h5 class="text-uppercase mt-0 mb-3 bg-light p-2">Country Details</h5>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="send_country_code">Send Country</label>
                                            <select class="selectpicker border rounded show-tick"  data-style="btn" data-dropup-auto="false" id="send_country_code" title="Select Send Country Code" required>
                                                <option value="India">India</option>
                                                <option value="Australia">Australia</option>
                                                <option value="United States">United States</option>
                                            </select>
                                            <div class="invalid-feedback">
                                                Invlaid Country
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="receive_country_code">Receive Country</label>
                                            <select class="selectpicker border rounded show-tick"  data-style="btn" data-dropup-auto="false" id="receive_country_code" title="Select Receive Country Code" required>
                                                <option value="India">India</option>
                                                <option value="Australia">Australia</option>
                                                <option value="United States">United States</option>
                                            </select>
                                            <div class="invalid-feedback">
                                                Invlaid Country
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card-box">
                                <h5 class="text-uppercase mt-0 mb-3 bg-light p-2">Currency Details</h5>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="send_currency_code">Send Currency Code</label>
                                            <select class="selectpicker border rounded show-tick"  data-style="btn" data-dropup-auto="false" id="send_currency_code" title="Select Send Currency Code" required>
                                                <option value="AED">AED</option>
                                                <option value="AUD">AUD</option>
                                                <option value="INR">INR</option>
                                                <option value="USD">USD</option>
                                            </select>
                                            <div class="invalid-feedback">
                                                Invlaid Currency code
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group mb-3">
                                            <label for="receive_currency_code">Receive Currency Code</label>
                                            <select class="selectpicker border rounded show-tick"  data-style="btn" data-dropup-auto="false" id="receive_currency_code" title="Select Receive Currency Code" required>
                                                <option value="AED">AED</option>
                                                <option value="AUD">AUD</option>
                                                <option value="INR">INR</option>
                                                <option value="USD">USD</option>
                                            </select>
                                            <div class="invalid-feedback">
                                                Invlaid Currency code
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card-box">
                                <h5 class="text-uppercase mt-0 mb-3 bg-light p-2">Exchange Rate</h5>
                                <div class="form-group mb-3">
                                    <label for="rate">Rate</label>
                                    <input class="form-control numbdecimal" type="tel" id="rate" required placeholder="Rate">
                                    <div class="invalid-feedback">

                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="text-center"><button class="btn btn-primary w-sm waves-effect waves-light mb-4" type="submit"> Add Exchange Rate</button></div>
                </form>
            </div> <!-- container -->
        </div> <!-- content -->
        <!-- footer -->
        <footer th:replace="base/footer :: footer"></footer>
        <!-- notification Modal -->
        <div th:replace="popup/notification :: notifymodal"></div>
    </div>
    <!-- content-page end -->

</div>
<div th:replace="base/script :: script"></div>
</body>
</html>
