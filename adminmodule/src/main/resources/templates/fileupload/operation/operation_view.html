<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="base/header :: head"></head>
<div id="wrapper">
    <div th:replace="base/top_header" :: div></div>
    <div th:replace="base/left_menu" :: div></div>

    <div class="content-page">
        <div class="content">
            <!-- Start Content-->
            <div class="container-fluid">
                <!-- start page title -->
                <div class="row">
                    <div class="col-12">
                        <div class="page-title-box">
                            <div class="page-title-right">
                                <ol class="breadcrumb m-0">
                                    <li class="breadcrumb-item"><a href="javascript: void(0);">File Uploads</a></li>
                                    <li class="breadcrumb-item active">Operation Function</li>
                                </ol>
                            </div>
                            <h4 class="page-title">Operation Function</h4>
                        </div>
                    </div>
                </div>
                <!-- end page title -->
                <form th:action="@{/fileupload/updateOperations}" method="post" th:object="${fileUploadDTO}" novalidate autocomplete="off" >
                <div class="card-box">
                        <h5 class="text-uppercase mt-0 mb-3 bg-light p-2">Operation Details</h5>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="type">Type</label>
                                    <select class="selectpicker show-tick border" id="type" required  title="Select Type" data-style="btn" data-dropup-auto="false" th:field="*{uploadType}">
                                        <option value="Statement">Statement</option>
                                        <option value="Other">Other</option>
                                    </select>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="accounttype">Account Type</label>
                                    <select class="selectpicker show-tick border" id="accounttype" th:field="*{accountType}"  required  title="Select Account type" data-style="btn" data-dropup-auto="false">
                                        <option value="Collection">Collection</option>
                                        <option value="Disbursement">Disbursement</option>
                                    </select>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="accounttype">Statement Type</label>
                                    <select class="selectpicker show-tick border" id="stmttype" th:field="*{statementType}"  required  title="Select Statement type" data-style="btn" data-dropup-auto="false">
                                        <option value="Interim">Interim</option>
                                        <option value="Final">Final</option>
                                    </select>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="currency">Currency</label>
                                    <select class="selectpicker show-tick border" id="currency"   th:field="*{currencyCode}" title="Select Currency type" data-style="btn" data-dropup-auto="false"
                                            name="*currencies"  required>
                                        <option th:each="currency : ${currencies}" th:value="${currency.id}">[[${currency.currencyCode}]] - [[${currency.currencyName}]]</option>
                                    </select>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="bank">Bank</label>
                                    <select class="selectpicker show-tick border" id="bank" required  th:field="*{bankDetails}" title="Select Bank type" data-style="btn" data-dropup-auto="false">
                                        <option th:each="bank : ${bankdetails}" th:value="${bank.id}">[[${bank.bankName}]]</option>
                                    </select>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="bank">Account Number</label>
                                    <select class="selectpicker show-tick border" id="bankaccno" required  th:field="*{accountNumber}" title="Select Account Number" data-style="btn" data-dropup-auto="false">
                                        <option th:each="bankacc : ${bankAccount}" th:value="${bankacc.accountNo}">[[${bankacc.accountNo}]]</option>
                                    </select>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3 mt-1">
                                    <label class="d-block">Number of files</label>

                                    <th:block th:each="file : ${files}">
                                        <a th:href="@{/fileupload/viewfile/}+${file.id}">[[${file.name}]]</a>
                                    </th:block>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mt-3">
                                    <label class="mr-2">Approve</label>
                                    <label for="checkboxtoggle1" class="checkboxtoggle pt-2">
                                        <input type="checkbox" id="checkboxtoggle1" class="checkbox_input" name="isapproved" th:field="*{isApproved}"  value="true" checked>
                                        <div class="checkboxtoggle_fill"></div>
                                    </label>
                                    <div class="invalid-feedback">
                                    </div>
                                </div>
                            </div>
                            <input type="hidden" id="id"  name="id" th:field="*{id}">

                        </div>
                    </div>
                    <div class="text-center">

                        <button th:if="${fileUploadDTO.isApproved}" class="btn btn-primary w-sm waves-effect waves-light mb-4" type="submit" disabled> Update </button>
                        <button th:unless="${fileUploadDTO.isApproved}" class="btn btn-primary w-sm waves-effect waves-light mb-4" type="submit"> Update </button>


                    </div>
                </form>
                <!-- end row -->
            </div> <!-- container -->
        </div> <!-- content -->
        <footer th:replace="base/footer :: footer"></footer>
        <div id="notification-modal" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog modal-sm">
                <div class="modal-content">
                    <div class="modal-body p-4">
                        <div class="text-center">
                            <h4 class="mt-2">Authorize</h4>
                            <p class="mt-3">Fee</p>
                            <button type="button" class="btn btn-primary my-2" data-dismiss="modal">Yes</button>
                            <button type="button" class="btn btn-outline-primary my-2" data-dismiss="modal">No</button>
                        </div>
                    </div>
                </div><!-- /.modal-content -->
            </div><!-- /.modal-dialog -->
        </div>
    </div>

</div>
</body>
<script th:src="@{/js/vendor.min.js}"></script>
<script th:src="@{/libs/bootstrap-datepicker/js/bootstrap-datepicker.min.js}"></script>
<script th:src="@{/libs/bootstrap-select/js/bootstrap-select.min.js}"></script>
<!-- App js -->
<script  th:src="@{/js/app.min.js}"></script>
<script  th:src="@{/js/custom.js}"></script>
<script  th:src="@{/js/compliance.js}"></script>

</html>
