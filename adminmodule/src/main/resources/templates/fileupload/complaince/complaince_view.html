<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="base/header :: head"></head>
<div id="wrapper">
    <div th:replace="base/top_header" :: div></div>
    <div th:replace="base/left_menu" :: div></div>

    <div class="content-page">
        <div class="content">
            <div class="container-fluid">
                <!-- start page title -->
                <div class="row">
                    <div class="col-12">
                        <div class="page-title-box">
                            <div class="page-title-right">
                                <ol class="breadcrumb m-0">
                                    <li class="breadcrumb-item"><a href="javascript: void(0);">File Uploads</a></li>
                                    <li class="breadcrumb-item active">Complaince Function</li>
                                </ol>
                            </div>
                            <h4 class="page-title">Complaince Function</h4>
                        </div>
                    </div>
                </div>
                <!-- end page title -->
                <form action="#"  class="needs-validation" novalidate autocomplete="off">
                    <div class="card-box">
                        <h5 class="text-uppercase mt-0 mb-3 bg-light p-2">Upload Files</h5>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="type">Type</label>
                                    <select class="selectpicker show-tick border" id="type" required  title="Select Type" data-style="btn" data-dropup-auto="false">
                                        <option value="Customer Document" selected>Customer Document</option>
                                        <option value="Other">Other</option>
                                    </select>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="subtype">Sub-Type</label>
                                    <select class="selectpicker show-tick border" id="subtype" required  title="Select Sub-Type" data-style="btn" data-dropup-auto="false">
                                        <option value="Account Related" selected>Account Related</option>
                                        <option value="Transaction Related">Transaction Related</option>
                                    </select>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="filuptxt" class="filuptxt">User Id</label>
                                    <input class="form-control" type="text" id="filuptxt" required value="xyz@gmail.com">
                                    <div class="invalid-feedback">
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3 mt-1">
                                    <label class="d-block">Number of files</label>
                                    <a href="#">Filename1.jpg</a>
                                    <a href="#">Filename2.jpg</a>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mt-3">
                                    <label class="mr-2">Approve</label>
                                    <label for="checkboxtoggle1" class="checkboxtoggle pt-2">
                                        <input type="checkbox" id="checkboxtoggle1" class="checkbox_input" checked>
                                        <div class="checkboxtoggle_fill"></div>
                                    </label>
                                    <div class="invalid-feedback">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="text-center"><button class="btn btn-primary w-sm waves-effect waves-light mb-4" type="submit"> Update </button></div>
                </form>
            </div> <!-- container -->
        </div> <!-- content -->

        <footer th:replace="base/footer :: footer"></footer>
        <div id="notification-modal" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog modal-sm">
                <div class="modal-content">
                    <div class="modal-body p-4">
                        <div class="text-center">
                            <h4 class="mt-2">Authorize</h4>
                            <p class="mt-3">Fee</p>
                            <button type="button" class="btn btn-primary my-2" data-dismiss="modal">Yes</button>
                            <button type="button" class="btn btn-outline-primary my-2" data-dismiss="modal">No</button>
                        </div>
                    </div>
                </div><!-- /.modal-content -->
            </div><!-- /.modal-dialog -->
        </div>
    </div>

</div>
</body>
<script th:src="@{/js/vendor.min.js}"></script>
<script th:src="@{/libs/bootstrap-datepicker/js/bootstrap-datepicker.min.js}"></script>
<script th:src="@{/libs/bootstrap-select/js/bootstrap-select.min.js}"></script>
<!-- App js -->
<script  th:src="@{/js/app.min.js}"></script>
<script  th:src="@{/js/custom.js}"></script>
</html>
