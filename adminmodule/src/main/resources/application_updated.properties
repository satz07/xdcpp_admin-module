security.basic.enabled=false
server.port=8090

#Sprign session saving to redis
spring.session.store-type=redis
spring.redis.host=localhost
spring.redis.port=6379
server.servlet.session.timeout=100000
spring.session.redis.flush-mode=on-save
spring.session.redis.namespace=spring:session
spring.data.redis.repositories.enabled = false

#Liquibase
spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml
logging.level.liquibase = INFO

#Posgres config
spring.datasource.url=jdbc:postgresql://localhost:5432/remittances
spring.datasource.username=adminremit
spring.datasource.password=andremit

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

#Default super admin creation
admin.andremit.firstname=Admin
admin.andremit.lastname=Andremit
admin.andremit.username=superadmin
admin.andremit.password=superadmin
admin.andremit.default.role=SUPERADMIN
admin.partner.name=Andremit
admin.product.name=Andremit
admin.group.name=Super Admin Group

reset.password.url=http://localhost:8090/reset/password/

spring.main.banner-mode=off
spring.mail.protocol=smtp
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=no-reply@weclick.in
spring.mail.password=weclick@1234
spring.mail.properties.mail.smtp.auth = true
spring.mail.properties.mail.smtp.starttls.enable = true

org.hibernate.envers.audit_table_prefix = audit
org.hibernate.envers.audit_table_suffix =
org.hibernate.envers.revision_on_collection_change = false

management.endpoints.web.exposure.include=*
endpoints.metrics.id=springmetrics
endpoints.metrics.sensitive=false
endpoints.metrics.enabled=true
endpoints.sensitive=true
endpoints.info.sensitive=false

spring.thymeleaf.cache=true
#spring.resources.cache-period=500
spring.resources.chain.html-application-cache=true

spring.resources.chain.enabled=true
spring.resources.chain.strategy.content.enabled=true
spring.resources.chain.strategy.content.paths=/**

file.upload.operations=/tmp